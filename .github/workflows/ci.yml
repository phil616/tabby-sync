name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true
      - uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.12.7
          args: check

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: tabby-config-sync:ci
